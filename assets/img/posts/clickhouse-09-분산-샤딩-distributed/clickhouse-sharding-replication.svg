<svg width="840" height="450" viewBox="0 0 840 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="-apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <title id="t">ClickHouse 샤딩과 복제</title>
  <desc id="d">Distributed 테이블이 여러 샤드로 쿼리를 분배하고, 각 샤드는 복제본으로 같은 데이터를 복사하며 Keeper가 복제를 조정한다</desc>
  <defs>
    <marker id="cr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="840" height="450" rx="14" fill="#ffffff"/>
  <text x="28" y="32" font-size="18" font-weight="700" fill="#0f172a">샤딩(데이터 나눔) + 복제(같은 데이터 복사)</text>

  <rect x="300" y="48" width="240" height="46" rx="9" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="420" y="77" font-size="13" font-weight="700" fill="#1d4ed8" text-anchor="middle">Distributed 테이블 (쿼리 분배)</text>

  <g stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#cr)">
    <path d="M360 94 L210 118"/>
    <path d="M480 94 L630 118"/>
  </g>

  <!-- shard 1 -->
  <rect x="36" y="120" width="350" height="248" rx="11" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5"/>
  <text x="56" y="146" font-size="14" font-weight="700" fill="#0f766e">Shard 1 — 데이터의 절반</text>
  <rect x="60" y="158" width="302" height="84" rx="8" fill="#ffffff" stroke="#99f6e4" stroke-width="1.5"/>
  <text x="211" y="190" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">replica A</text>
  <text x="211" y="212" font-size="11" fill="#475569" text-anchor="middle">Shard1 데이터 (ReplicatedMergeTree)</text>
  <rect x="60" y="270" width="302" height="84" rx="8" fill="#ffffff" stroke="#99f6e4" stroke-width="1.5"/>
  <text x="211" y="302" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">replica B</text>
  <text x="211" y="324" font-size="11" fill="#475569" text-anchor="middle">같은 데이터 복사본 (HA)</text>
  <path d="M211 242 L211 270" stroke="#0d9488" stroke-width="1.6" fill="none" marker-end="url(#cr)" marker-start="url(#cr)"/>

  <!-- shard 2 -->
  <rect x="454" y="120" width="350" height="248" rx="11" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5"/>
  <text x="474" y="146" font-size="14" font-weight="700" fill="#0f766e">Shard 2 — 나머지 절반</text>
  <rect x="478" y="158" width="302" height="84" rx="8" fill="#ffffff" stroke="#99f6e4" stroke-width="1.5"/>
  <text x="629" y="190" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">replica A</text>
  <text x="629" y="212" font-size="11" fill="#475569" text-anchor="middle">Shard2 데이터 (ReplicatedMergeTree)</text>
  <rect x="478" y="270" width="302" height="84" rx="8" fill="#ffffff" stroke="#99f6e4" stroke-width="1.5"/>
  <text x="629" y="302" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">replica B</text>
  <text x="629" y="324" font-size="11" fill="#475569" text-anchor="middle">같은 데이터 복사본 (HA)</text>
  <path d="M629 242 L629 270" stroke="#0d9488" stroke-width="1.6" fill="none" marker-end="url(#cr)" marker-start="url(#cr)"/>

  <!-- keeper -->
  <rect x="300" y="386" width="240" height="44" rx="9" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
  <text x="420" y="414" font-size="13" font-weight="700" fill="#c2410c" text-anchor="middle">ClickHouse Keeper (복제 조정)</text>
  <g stroke="#fb923c" stroke-width="1.4" fill="none" stroke-dasharray="5 4">
    <path d="M340 408 L300 320"/>
    <path d="M500 408 L540 320"/>
  </g>

  <text x="28" y="446" font-size="11" fill="#94a3b8">샤딩 = 가로로 나눠 용량·병렬↑ · 복제 = 같은 데이터 복사로 가용성↑ · Keeper가 복제 메타데이터를 합의·조정</text>
</svg>
