<svg width="860" height="450" viewBox="0 0 860 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="-apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <title id="t">ReplicatedMergeTree와 Keeper — 어느 레플리카에나 쓰고, Keeper는 조율만, 데이터는 레플리카끼리 오간다</title>
  <desc id="d">INSERT는 아무 레플리카에나 보낼 수 있고(멀티마스터), 받은 레플리카는 데이터 파트를 디스크에 쓰고 블록 해시·복제로그를 Keeper에 올린다. 다른 레플리카는 Keeper 큐를 보고 파트를 직접 당겨와 최종 일관성으로 수렴한다. 같은 해시 재시도는 건너뛰고(중복제거), SELECT는 Keeper를 거치지 않는다.</desc>
  <defs>
    <marker id="rm" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
    <marker id="rmt" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#0d9488"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="860" height="450" rx="14" fill="#ffffff"/>
  <text x="28" y="34" font-size="18" font-weight="700" fill="#0f172a">복제 — 어느 레플리카에나 쓰고(멀티마스터), Keeper는 조율만 한다</text>

  <!-- client -->
  <rect x="28" y="120" width="110" height="56" rx="9" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="83" y="144" font-size="12" font-weight="700" fill="#334155" text-anchor="middle">클라이언트</text>
  <text x="83" y="162" font-size="10.5" fill="#64748b" text-anchor="middle">INSERT</text>

  <!-- replica A -->
  <rect x="190" y="86" width="220" height="124" rx="11" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.8"/>
  <text x="300" y="110" font-size="13" font-weight="700" fill="#1d4ed8" text-anchor="middle">레플리카 A (받은 노드)</text>
  <rect x="206" y="122" width="188" height="32" rx="6" fill="#dbeafe" stroke="#bfdbfe"/><text x="300" y="143" font-size="10.5" fill="#1e3a8a" text-anchor="middle">① 압축 데이터 파트를 디스크에 씀</text>
  <rect x="206" y="162" width="188" height="32" rx="6" fill="#dbeafe" stroke="#bfdbfe"/><text x="300" y="183" font-size="10.5" fill="#1e3a8a" text-anchor="middle">② 블록 해시·복제로그를 Keeper에</text>

  <!-- replica B -->
  <rect x="190" y="262" width="220" height="124" rx="11" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.8"/>
  <text x="300" y="286" font-size="13" font-weight="700" fill="#1d4ed8" text-anchor="middle">레플리카 B</text>
  <rect x="206" y="298" width="188" height="32" rx="6" fill="#dbeafe" stroke="#bfdbfe"/><text x="300" y="319" font-size="10.5" fill="#1e3a8a" text-anchor="middle">③ Keeper 큐 보고 할 일 확인</text>
  <rect x="206" y="338" width="188" height="32" rx="6" fill="#dbeafe" stroke="#bfdbfe"/><text x="300" y="359" font-size="10.5" fill="#1e3a8a" text-anchor="middle">④ 파트를 A에서 직접 당겨옴</text>

  <!-- Keeper -->
  <rect x="500" y="150" width="200" height="150" rx="11" fill="#fff7ed" stroke="#fdba74" stroke-width="1.8"/>
  <text x="600" y="176" font-size="13" font-weight="700" fill="#c2410c" text-anchor="middle">ClickHouse Keeper</text>
  <text x="600" y="193" font-size="10" fill="#9a6b43" text-anchor="middle">Raft(NuRaft) · 최소 3노드</text>
  <rect x="516" y="204" width="168" height="28" rx="5" fill="#ffedd5" stroke="#fed7aa"/><text x="600" y="223" font-size="10" fill="#7c2d12" text-anchor="middle">복제 큐 · 레플리카 정보</text>
  <rect x="516" y="238" width="168" height="28" rx="5" fill="#ffedd5" stroke="#fed7aa"/><text x="600" y="257" font-size="10" fill="#7c2d12" text-anchor="middle">블록 해시(중복제거용)</text>
  <text x="600" y="286" font-size="10" font-weight="700" fill="#c2410c" text-anchor="middle">조율 메타데이터만 — 데이터 X</text>

  <!-- arrows -->
  <!-- client -> A -->
  <path d="M138 148 L186 148" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#rm)"/>
  <text x="162" y="138" font-size="9" fill="#64748b" text-anchor="middle">아무 노드</text>
  <!-- A -> Keeper (hash/log) -->
  <path d="M410 178 C460 178 470 200 496 210" stroke="#ea580c" stroke-width="1.8" fill="none" marker-end="url(#rm)"/>
  <!-- Keeper -> B (queue) -->
  <path d="M540 300 C520 330 470 322 412 318" stroke="#ea580c" stroke-width="1.8" fill="none" marker-end="url(#rm)"/>
  <!-- A -> B data part pull (teal, the actual data) -->
  <path d="M250 210 L250 260" stroke="#0d9488" stroke-width="2.6" fill="none" marker-end="url(#rmt)"/>
  <text x="160" y="240" font-size="10.5" font-weight="700" fill="#0d9488">데이터 파트는</text>
  <text x="160" y="254" font-size="10.5" font-weight="700" fill="#0d9488">레플리카끼리 직접</text>

  <!-- dedup callout -->
  <rect x="500" y="86" width="336" height="46" rx="9" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.3"/>
  <text x="516" y="106" font-size="11" font-weight="700" fill="#b91c1c">중복제거: 재시도해도 안전(idempotent)</text>
  <text x="516" y="122" font-size="10" fill="#7f1d1d">같은 블록 해시가 Keeper에 이미 있으면 → 기록 건너뜀</text>

  <!-- SELECT bypasses keeper -->
  <rect x="500" y="318" width="336" height="68" rx="9" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.3"/>
  <text x="516" y="340" font-size="11" font-weight="700" fill="#047857">SELECT은 Keeper를 거치지 않는다</text>
  <text x="516" y="357" font-size="10" fill="#475569">읽기 경로엔 조율이 없음 → 복제 테이블의 읽기 성능은</text>
  <text x="516" y="372" font-size="10" fill="#475569">비복제와 동등. 조율 비용은 INSERT(≈10 Keeper 엔트리)에만.</text>

  <text x="28" y="418" font-size="11" fill="#94a3b8">비동기 멀티마스터 = 어느 레플리카에나 쓰고, 시차를 두고 나머지가 따라잡는 최종 일관성. 레플리카가 잠깐 죽어도 살아나면 밀린 큐를 따라잡는다.</text>
  <text x="28" y="437" font-size="11" fill="#94a3b8">유실을 막으려면 insert_quorum=N(또는 강한 읽기 일관성은 insert_quorum_parallel=0 + select_sequential_consistency=1 조합). 공식 문서 기준.</text>
</svg>
