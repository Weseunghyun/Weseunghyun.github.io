<svg width="800" height="410" viewBox="0 0 800 410" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="-apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <title id="t">Docker bridge 네트워킹</title>
  <desc id="d">컨테이너가 veth로 브리지에 연결되고, 사용자 정의 네트워크에선 이름으로 통신하며, -p 포트 퍼블리시는 iptables NAT로 외부에 노출한다</desc>
  <defs>
    <marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
    <marker id="abg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#0d9488"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="410" rx="14" fill="#ffffff"/>
  <text x="28" y="32" font-size="18" font-weight="700" fill="#0f172a">Docker 네트워킹 — bridge · veth · 포트 퍼블리시</text>

  <!-- external -->
  <rect x="24" y="150" width="120" height="74" rx="9" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="84" y="182" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">외부 요청</text>
  <text x="84" y="202" font-size="11" fill="#475569" text-anchor="middle">브라우저</text>

  <!-- host -->
  <rect x="180" y="58" width="596" height="318" rx="11" fill="#fafafa" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="198" y="82" font-size="13" font-weight="700" fill="#334155">Host (서버 / 노드)</text>

  <!-- containers -->
  <g text-anchor="middle">
    <rect x="250" y="120" width="210" height="92" rx="9" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5"/>
    <text x="355" y="152" font-size="14" font-weight="700" fill="#0f766e">container: api</text>
    <text x="355" y="174" font-size="11" fill="#475569">eth0 · 172.18.0.2</text>
    <text x="355" y="194" font-size="11" fill="#475569">포트 80</text>

    <rect x="496" y="120" width="210" height="92" rx="9" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5"/>
    <text x="601" y="152" font-size="14" font-weight="700" fill="#0f766e">container: db</text>
    <text x="601" y="174" font-size="11" fill="#475569">eth0 · 172.18.0.3</text>
    <text x="601" y="194" font-size="11" fill="#475569">포트 5432</text>
  </g>

  <!-- bridge -->
  <rect x="230" y="300" width="496" height="40" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="478" y="325" font-size="13" font-weight="700" fill="#334155" text-anchor="middle">bridge (사용자 정의 네트워크 mynet) · 내장 DNS</text>

  <!-- veth -->
  <g stroke="#64748b" stroke-width="1.6" fill="none">
    <path d="M355 212 L355 300"/>
    <path d="M601 212 L601 300"/>
  </g>
  <text x="368" y="262" font-size="10" fill="#64748b">veth</text>
  <text x="614" y="262" font-size="10" fill="#64748b">veth</text>

  <!-- external to api : port publish -->
  <path d="M144 187 L180 187 L250 166" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#ab)"/>
  <rect x="150" y="96" width="180" height="40" rx="7" fill="#fff7ed" stroke="#fb923c"/>
  <text x="240" y="121" font-size="11" font-weight="700" fill="#c2410c" text-anchor="middle">-p 8080:80 (iptables NAT)</text>

  <!-- api to db by name -->
  <path d="M460 158 L494 158" stroke="#0d9488" stroke-width="1.6" fill="none" stroke-dasharray="5 4" marker-end="url(#abg)"/>
  <text x="478" y="115" font-size="10" font-weight="700" fill="#0d9488" text-anchor="middle">api → "db" 이름으로 호출</text>

  <text x="28" y="396" font-size="11" fill="#94a3b8">사용자 정의 네트워크 = 이름(DNS)으로 통신 · -p = 외부 노출(방화벽 우회 주의, 127.0.0.1: 바인드 권장)</text>
</svg>
