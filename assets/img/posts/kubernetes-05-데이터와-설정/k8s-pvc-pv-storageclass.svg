<svg width="800" height="270" viewBox="0 0 800 270" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="-apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <title id="t">PVC·PV·StorageClass의 분리</title>
  <desc id="d">Pod는 PVC로 저장소를 신청만 하고, StorageClass가 PV를 자동 생성해 실제 디스크를 연결한다</desc>
  <defs>
    <marker id="a5" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="270" rx="14" fill="#ffffff"/>
  <text x="28" y="32" font-size="18" font-weight="700" fill="#0f172a">저장소 — 쓰는 쪽(신청)과 주는 쪽(실제)을 나눈다</text>

  <g text-anchor="middle">
    <rect x="24" y="74" width="170" height="112" rx="9" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5"/>
    <text x="109" y="116" font-size="14" font-weight="700" fill="#0f766e">Pod</text>
    <text x="109" y="140" font-size="11" fill="#475569">「10Gi 저장소</text>
    <text x="109" y="156" font-size="11" fill="#475569">필요해」</text>

    <rect x="218" y="74" width="170" height="112" rx="9" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="303" y="112" font-size="14" font-weight="700" fill="#1d4ed8">PVC</text>
    <text x="303" y="134" font-size="11" fill="#475569">신청서</text>
    <text x="303" y="152" font-size="11" fill="#475569">10Gi · RWO</text>

    <rect x="412" y="74" width="170" height="112" rx="9" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="497" y="112" font-size="14" font-weight="700" fill="#1d4ed8">StorageClass</text>
    <text x="497" y="134" font-size="11" fill="#475569">자동 발급기</text>
    <text x="497" y="152" font-size="11" fill="#475569">동적 프로비저닝</text>

    <rect x="606" y="74" width="170" height="112" rx="9" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="691" y="112" font-size="14" font-weight="700" fill="#334155">PV</text>
    <text x="691" y="134" font-size="11" fill="#475569">실제 디스크</text>
    <text x="691" y="152" font-size="11" fill="#475569">(클라우드 볼륨)</text>
  </g>

  <g stroke="#64748b" stroke-width="1.6" fill="none" marker-end="url(#a5)">
    <path d="M194 130 L216 130"/>
    <path d="M388 130 L410 130"/>
    <path d="M582 130 L604 130"/>
  </g>
  <text x="303" y="206" font-size="11" fill="#64748b" text-anchor="middle">신청</text>
  <text x="497" y="206" font-size="11" fill="#64748b" text-anchor="middle">자동 생성</text>

  <text x="28" y="248" font-size="11" fill="#94a3b8">앱은 PVC만 선언 — 실제 디스크가 AWS인지 GCP인지 몰라도, 같은 매니페스트가 어디서든 돈다.</text>
</svg>
