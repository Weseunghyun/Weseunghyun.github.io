<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 330" width="740" height="330" role="img" aria-labelledby="t d">
  <title id="t">Prometheus TSDB 데이터 수명주기</title>
  <desc id="d">새 샘플은 WAL에 먼저 기록되고 메모리 head block에 쌓인다. 다 찬 chunk는 디스크로 mmap되고, 2시간마다 immutable block으로 flush된 뒤 compaction으로 병합된다.</desc>
  <style>
    .bg{fill:#f8fafc;stroke:#e2e8f0;stroke-width:1.5}
    .h2{font:700 16px system-ui,sans-serif;fill:#0f172a}
    .h{font:700 13px system-ui,sans-serif;fill:#0f172a}
    .s{font:400 11px system-ui,sans-serif;fill:#475569}
    .mem{fill:#fef3c7;stroke:#d97706;stroke-width:1.8}
    .disk{fill:#dbeafe;stroke:#2563eb;stroke-width:1.8}
    .wal{fill:#fee2e2;stroke:#dc2626;stroke-width:1.8}
    .ar{stroke:#64748b;stroke-width:2.2;fill:none;marker-end:url(#a)}
    .lab{font:700 10px system-ui,sans-serif;fill:#475569}
  </style>
  <defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker></defs>
  <rect class="bg" x="1" y="1" width="738" height="328" rx="14"/>
  <text class="h2" x="28" y="38">긁은 샘플이 디스크에 자리잡기까지</text>

  <!-- incoming -->
  <text class="h" x="30" y="120">새 샘플</text>
  <text class="s" x="30" y="138">(scrape)</text>
  <path class="ar" d="M95 120 H150"/>

  <!-- WAL -->
  <rect class="wal" x="152" y="92" width="120" height="56" rx="10"/>
  <text class="h" x="168" y="116" fill="#991b1b">WAL</text>
  <text class="s" x="168" y="136">먼저 기록(안전)</text>

  <!-- head (memory) -->
  <rect class="mem" x="300" y="70" width="170" height="100" rx="10"/>
  <text class="lab" x="316" y="92">MEMORY</text>
  <text class="h" x="316" y="114" fill="#92400e">head block</text>
  <text class="s" x="316" y="134">최근 데이터</text>
  <text class="s" x="316" y="151">= 메모리에 상주</text>
  <path class="ar" d="M272 120 H298"/>
  <text class="lab" x="276" y="112">동시</text>

  <!-- mmap -->
  <rect class="disk" x="300" y="196" width="170" height="48" rx="10"/>
  <text class="h" x="316" y="218" fill="#1e40af">chunks_head (mmap)</text>
  <text class="s" x="316" y="235">다 찬 chunk → 디스크 매핑</text>
  <path class="ar" d="M385 170 V194"/>

  <!-- block -->
  <rect class="disk" x="500" y="70" width="210" height="78" rx="10"/>
  <text class="lab" x="516" y="92">DISK · immutable</text>
  <text class="h" x="516" y="114" fill="#1e40af">block (2h, ULID)</text>
  <text class="s" x="516" y="133">chunks · index(postings) · meta</text>
  <path class="ar" d="M470 110 H498"/>
  <text class="lab" x="474" y="100">flush(2h)</text>

  <!-- compaction -->
  <rect class="disk" x="500" y="180" width="210" height="64" rx="10"/>
  <text class="h" x="516" y="204" fill="#1e40af">compaction</text>
  <text class="s" x="516" y="223">작은 block → 큰 block 병합</text>
  <text class="s" x="516" y="239">+ retention 만료 삭제</text>
  <path class="ar" d="M605 148 V178"/>

  <text class="s" x="28" y="300">핵심: head block이 메모리에 산다 → 시계열 수가 곧 메모리. 카디널리티가 터지면 여기서 OOM. (6장)</text>
</svg>
