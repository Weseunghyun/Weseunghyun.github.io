<svg width="840" height="380" viewBox="0 0 840 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="-apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <title id="t">MergeTree — part 생성과 백그라운드 머지</title>
  <desc id="d">INSERT는 정렬된 새 part를 만들고, 백그라운드 머지가 작은 part들을 큰 part로 합친다</desc>
  <defs>
    <marker id="cm" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="840" height="380" rx="14" fill="#ffffff"/>
  <text x="28" y="32" font-size="18" font-weight="700" fill="#0f172a">MergeTree — INSERT는 part를 만들고, 머지가 합친다</text>

  <!-- inserts -->
  <g font-size="11" fill="#64748b" text-anchor="middle">
    <text x="110" y="66">INSERT</text><text x="290" y="66">INSERT</text><text x="470" y="66">INSERT</text><text x="650" y="66">INSERT</text>
  </g>
  <g stroke="#64748b" stroke-width="1.4" fill="none" marker-end="url(#cm)">
    <path d="M110 70 L110 88"/><path d="M290 70 L290 88"/><path d="M470 70 L470 88"/><path d="M650 70 L650 88"/>
  </g>

  <!-- small parts -->
  <g text-anchor="middle">
    <rect x="40" y="90" width="140" height="74" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><text x="110" y="120" font-size="13" font-weight="700" fill="#1d4ed8">part_1</text><text x="110" y="142" font-size="10" fill="#475569">ORDER BY로 정렬 · 불변</text>
    <rect x="220" y="90" width="140" height="74" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><text x="290" y="120" font-size="13" font-weight="700" fill="#1d4ed8">part_2</text><text x="290" y="142" font-size="10" fill="#475569">정렬 · 불변</text>
    <rect x="400" y="90" width="140" height="74" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><text x="470" y="120" font-size="13" font-weight="700" fill="#1d4ed8">part_3</text><text x="470" y="142" font-size="10" fill="#475569">정렬 · 불변</text>
    <rect x="580" y="90" width="140" height="74" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/><text x="650" y="120" font-size="13" font-weight="700" fill="#1d4ed8">part_4</text><text x="650" y="142" font-size="10" fill="#475569">정렬 · 불변</text>
  </g>

  <!-- merge arrows -->
  <g stroke="#0d9488" stroke-width="2" fill="none" marker-end="url(#cm)">
    <path d="M110 164 C110 210 230 210 240 244"/>
    <path d="M290 164 C290 210 250 210 250 244"/>
    <path d="M470 164 C470 210 590 210 600 244"/>
    <path d="M650 164 C650 210 610 210 610 244"/>
  </g>
  <text x="420" y="206" font-size="13" font-weight="700" fill="#0d9488" text-anchor="middle">백그라운드 머지 (정렬 유지하며 합침)</text>

  <!-- merged parts -->
  <g text-anchor="middle">
    <rect x="150" y="246" width="200" height="78" rx="9" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.8"/><text x="250" y="278" font-size="14" font-weight="700" fill="#0f766e">part_1_2 (merged)</text><text x="250" y="300" font-size="10" fill="#475569">더 큰 정렬 덩어리</text>
    <rect x="500" y="246" width="200" height="78" rx="9" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.8"/><text x="600" y="278" font-size="14" font-weight="700" fill="#0f766e">part_3_4 (merged)</text><text x="600" y="300" font-size="10" fill="#475569">더 큰 정렬 덩어리</text>
  </g>

  <text x="28" y="356" font-size="11" fill="#94a3b8">part는 불변 — 수정 없이 새 part를 만들고, 머지로 합쳐 part 수를 낮게 유지(성능 핵심). 같은 키 갱신·삭제도 머지 시점에 정리.</text>
</svg>
