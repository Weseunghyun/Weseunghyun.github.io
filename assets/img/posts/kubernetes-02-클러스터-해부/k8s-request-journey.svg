<svg width="820" height="340" viewBox="0 0 820 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="-apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <title id="t">kubectl apply 한 번의 여정</title>
  <desc id="d">kubectl이 제출한 원하는 상태가 API Server·etcd·controller·scheduler·kubelet을 거쳐 실행되고, 컨트롤러가 끊임없이 조정하는 흐름</desc>
  <defs>
    <marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="820" height="340" rx="14" fill="#ffffff"/>
  <text x="28" y="34" font-size="18" font-weight="700" fill="#0f172a">kubectl apply 한 번의 여정 — 선언 → 조정 → 실행</text>

  <g text-anchor="middle">
    <!-- 6 boxes -->
    <g>
      <rect x="20" y="72" width="118" height="92" rx="9" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
      <text x="79" y="104" font-size="13" font-weight="700" fill="#0f172a">kubectl</text>
      <text x="79" y="124" font-size="11" fill="#475569">apply</text>
      <text x="79" y="142" font-size="11" fill="#475569">원하는 상태 제출</text>
    </g>
    <g>
      <rect x="153" y="72" width="118" height="92" rx="9" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
      <text x="212" y="104" font-size="13" font-weight="700" fill="#1d4ed8">API Server</text>
      <text x="212" y="124" font-size="11" fill="#475569">인증·검증</text>
    </g>
    <g>
      <rect x="286" y="72" width="118" height="92" rx="9" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
      <text x="345" y="104" font-size="13" font-weight="700" fill="#1d4ed8">etcd</text>
      <text x="345" y="124" font-size="11" fill="#475569">원하는 상태</text>
      <text x="345" y="142" font-size="11" fill="#475569">저장</text>
    </g>
    <g>
      <rect x="419" y="72" width="118" height="92" rx="9" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
      <text x="478" y="104" font-size="13" font-weight="700" fill="#1d4ed8">controller</text>
      <text x="478" y="124" font-size="11" fill="#475569">현재 vs 원하는</text>
      <text x="478" y="142" font-size="11" fill="#475569">비교</text>
    </g>
    <g>
      <rect x="552" y="72" width="118" height="92" rx="9" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
      <text x="611" y="104" font-size="13" font-weight="700" fill="#1d4ed8">scheduler</text>
      <text x="611" y="124" font-size="11" fill="#475569">노드 배정</text>
    </g>
    <g>
      <rect x="685" y="72" width="118" height="92" rx="9" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5"/>
      <text x="744" y="104" font-size="13" font-weight="700" fill="#0f766e">kubelet</text>
      <text x="744" y="124" font-size="11" fill="#475569">컨테이너</text>
      <text x="744" y="142" font-size="11" fill="#475569">실제 실행</text>
    </g>
  </g>

  <!-- arrows -->
  <g stroke="#64748b" stroke-width="1.6" fill="none" marker-end="url(#a2)">
    <path d="M138 118 L151 118"/>
    <path d="M271 118 L284 118"/>
    <path d="M404 118 L417 118"/>
    <path d="M537 118 L550 118"/>
    <path d="M670 118 L683 118"/>
  </g>

  <!-- reconcile loop -->
  <path d="M744 164 C744 250 478 250 478 168" stroke="#0d9488" stroke-width="2" fill="none" stroke-dasharray="6 4" marker-end="url(#a2)"/>
  <text x="611" y="240" font-size="12" font-weight="700" fill="#0d9488" text-anchor="middle">끊임없이 반복 — 현재≠원하는 → 다시 조정(자가치유)</text>

  <text x="28" y="320" font-size="11" fill="#94a3b8">파랑 = control plane(두뇌) · 청록 = node(일꾼) · 점선 = reconciliation 루프</text>
</svg>
