<svg width="840" height="420" viewBox="0 0 840 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="-apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <title id="t">행 지향 저장 vs 컬럼 지향 저장</title>
  <desc id="d">행 지향은 한 행의 모든 값을 붙여 저장해 집계 시 전부 읽고, 컬럼 지향은 컬럼끼리 모아 저장해 필요한 컬럼만 읽는다</desc>
  <rect x="0" y="0" width="840" height="420" rx="14" fill="#ffffff"/>
  <text x="28" y="32" font-size="18" font-weight="700" fill="#0f172a">"오늘 매출 합계 = sum(금액)" 를 구할 때</text>

  <!-- ROW oriented -->
  <text x="30" y="66" font-size="14" font-weight="700" fill="#1d4ed8">행 지향 (일반 RDB)</text>
  <text x="30" y="84" font-size="11" fill="#475569">한 행의 모든 값을 가로로 붙여 저장</text>
  <g font-size="11" text-anchor="middle">
    <g>
      <rect x="30" y="98" width="90" height="44" fill="#dbeafe" stroke="#93c5fd"/><text x="75" y="125" fill="#1e40af">1</text>
      <rect x="120" y="98" width="90" height="44" fill="#dbeafe" stroke="#93c5fd"/><text x="165" y="125" fill="#1e40af">김</text>
      <rect x="210" y="98" width="90" height="44" fill="#dbeafe" stroke="#93c5fd"/><text x="255" y="125" fill="#1e40af">12000</text>
      <rect x="300" y="98" width="90" height="44" fill="#dbeafe" stroke="#93c5fd"/><text x="345" y="125" fill="#1e40af">06-01</text>
    </g>
    <g>
      <rect x="30" y="146" width="90" height="44" fill="#dbeafe" stroke="#93c5fd"/><text x="75" y="173" fill="#1e40af">2</text>
      <rect x="120" y="146" width="90" height="44" fill="#dbeafe" stroke="#93c5fd"/><text x="165" y="173" fill="#1e40af">이</text>
      <rect x="210" y="146" width="90" height="44" fill="#dbeafe" stroke="#93c5fd"/><text x="255" y="173" fill="#1e40af">9000</text>
      <rect x="300" y="146" width="90" height="44" fill="#dbeafe" stroke="#93c5fd"/><text x="345" y="173" fill="#1e40af">06-01</text>
    </g>
    <g>
      <rect x="30" y="194" width="90" height="44" fill="#dbeafe" stroke="#93c5fd"/><text x="75" y="221" fill="#1e40af">3</text>
      <rect x="120" y="194" width="90" height="44" fill="#dbeafe" stroke="#93c5fd"/><text x="165" y="221" fill="#1e40af">박</text>
      <rect x="210" y="194" width="90" height="44" fill="#dbeafe" stroke="#93c5fd"/><text x="255" y="221" fill="#1e40af">15000</text>
      <rect x="300" y="194" width="90" height="44" fill="#dbeafe" stroke="#93c5fd"/><text x="345" y="221" fill="#1e40af">06-02</text>
    </g>
  </g>
  <text x="30" y="268" font-size="12" font-weight="700" fill="#b91c1c">→ 금액에 닿으려면 id·이름·날짜까지 전부 읽힘</text>
  <text x="30" y="288" font-size="11" fill="#64748b">파란 칸 = 디스크에서 읽는 데이터 (전부)</text>

  <!-- divider -->
  <line x1="420" y1="56" x2="420" y2="300" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- COLUMN oriented -->
  <text x="450" y="66" font-size="14" font-weight="700" fill="#0f766e">컬럼 지향 (ClickHouse)</text>
  <text x="450" y="84" font-size="11" fill="#475569">같은 컬럼끼리 세로로 모아 저장</text>
  <g font-size="11" text-anchor="middle">
    <!-- headers -->
    <text x="495" y="112" font-size="11" font-weight="700" fill="#475569">id</text>
    <text x="585" y="112" font-size="11" font-weight="700" fill="#475569">이름</text>
    <text x="675" y="112" font-size="11" font-weight="700" fill="#c2410c">금액</text>
    <text x="765" y="112" font-size="11" font-weight="700" fill="#94a3b8">날짜</text>
    <!-- id col (faded) -->
    <g fill="#94a3b8">
      <rect x="450" y="120" width="90" height="40" fill="#f8fafc" stroke="#e2e8f0"/><text x="495" y="145">1</text>
      <rect x="450" y="160" width="90" height="40" fill="#f8fafc" stroke="#e2e8f0"/><text x="495" y="185">2</text>
      <rect x="450" y="200" width="90" height="40" fill="#f8fafc" stroke="#e2e8f0"/><text x="495" y="225">3</text>
    </g>
    <g fill="#94a3b8">
      <rect x="540" y="120" width="90" height="40" fill="#f8fafc" stroke="#e2e8f0"/><text x="585" y="145">김</text>
      <rect x="540" y="160" width="90" height="40" fill="#f8fafc" stroke="#e2e8f0"/><text x="585" y="185">이</text>
      <rect x="540" y="200" width="90" height="40" fill="#f8fafc" stroke="#e2e8f0"/><text x="585" y="225">박</text>
    </g>
    <!-- 금액 col (highlighted) -->
    <g fill="#9a3412" font-weight="700">
      <rect x="630" y="120" width="90" height="40" fill="#ffedd5" stroke="#fb923c" stroke-width="1.5"/><text x="675" y="145">12000</text>
      <rect x="630" y="160" width="90" height="40" fill="#ffedd5" stroke="#fb923c" stroke-width="1.5"/><text x="675" y="185">9000</text>
      <rect x="630" y="200" width="90" height="40" fill="#ffedd5" stroke="#fb923c" stroke-width="1.5"/><text x="675" y="225">15000</text>
    </g>
    <g fill="#94a3b8">
      <rect x="720" y="120" width="90" height="40" fill="#f8fafc" stroke="#e2e8f0"/><text x="765" y="145">06-01</text>
      <rect x="720" y="160" width="90" height="40" fill="#f8fafc" stroke="#e2e8f0"/><text x="765" y="185">06-01</text>
      <rect x="720" y="200" width="90" height="40" fill="#f8fafc" stroke="#e2e8f0"/><text x="765" y="225">06-02</text>
    </g>
  </g>
  <text x="450" y="268" font-size="12" font-weight="700" fill="#15803d">→ 금액 뭉치 하나만 읽음 (나머지는 디스크에서 안 건드림)</text>
  <text x="450" y="288" font-size="11" fill="#64748b">주황 칸만 읽는다 = I/O가 수십 분의 일</text>

  <rect x="28" y="318" width="784" height="74" rx="9" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="44" y="344" font-size="12" font-weight="700" fill="#0f172a">왜 결정적인가</text>
  <text x="44" y="366" font-size="12" fill="#334155">분석 쿼리는 보통 수십 개 컬럼 중 몇 개만 쓴다 → 컬럼 저장은 "읽어야 할 데이터 양" 자체를 줄인다.</text>
  <text x="44" y="384" font-size="11" fill="#64748b">압축·벡터화·병렬화 — 나머지 빠름이 전부 이 컬럼 저장 위에서 가능해진다.</text>
</svg>
