<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="-apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <title id="t">이미지 레이어와 copy-on-write</title>
  <desc id="d">이미지는 읽기 전용 레이어의 스택이고, 컨테이너는 그 위에 얇은 쓰기 레이어를 얹어 copy-on-write로 동작한다</desc>
  <rect x="0" y="0" width="800" height="400" rx="14" fill="#ffffff"/>
  <text x="28" y="32" font-size="18" font-weight="700" fill="#0f172a">이미지 = 읽기 전용 레이어의 층층 + 컨테이너 쓰기 레이어</text>

  <!-- writable layer -->
  <rect x="170" y="58" width="340" height="48" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="340" y="87" font-size="13" font-weight="700" fill="#c2410c" text-anchor="middle">컨테이너 쓰기 레이어 (R/W)</text>

  <!-- image read-only layers -->
  <g text-anchor="middle">
    <rect x="170" y="120" width="340" height="46" rx="7" fill="#dbeafe" stroke="#93c5fd"/><text x="340" y="148" font-size="12" font-weight="700" fill="#1d4ed8">COPY . .  (소스 코드)</text>
    <rect x="170" y="172" width="340" height="46" rx="7" fill="#dbeafe" stroke="#93c5fd"/><text x="340" y="200" font-size="12" font-weight="700" fill="#1d4ed8">RUN npm ci  (의존성)</text>
    <rect x="170" y="224" width="340" height="46" rx="7" fill="#dbeafe" stroke="#93c5fd"/><text x="340" y="252" font-size="12" font-weight="700" fill="#1d4ed8">COPY package*.json</text>
    <rect x="170" y="276" width="340" height="46" rx="7" fill="#bfdbfe" stroke="#60a5fa"/><text x="340" y="304" font-size="12" font-weight="700" fill="#1e40af">node:22-alpine  (베이스)</text>
  </g>

  <!-- brackets -->
  <text x="150" y="226" font-size="11" font-weight="700" fill="#1d4ed8" text-anchor="middle" transform="rotate(-90 150 226)">이미지 · 읽기 전용 (불변)</text>
  <text x="150" y="84" font-size="11" font-weight="700" fill="#c2410c" text-anchor="middle" transform="rotate(-90 150 84)">컨테이너</text>

  <!-- notes -->
  <rect x="540" y="120" width="236" height="106" rx="9" fill="#fffbeb" stroke="#fcd34d"/>
  <text x="556" y="144" font-size="13" font-weight="700" fill="#b45309">copy-on-write</text>
  <text x="556" y="166" font-size="11" fill="#475569">읽기 → 아래 레이어 그대로</text>
  <text x="556" y="184" font-size="11" fill="#475569">쓰기 → 위 쓰기 레이어로</text>
  <text x="556" y="200" font-size="11" fill="#475569">복사한 뒤 수정 (아래는 불변)</text>
  <text x="556" y="218" font-size="11" font-weight="700" fill="#b91c1c">컨테이너 지우면 쓰기분 소멸</text>

  <rect x="540" y="240" width="236" height="82" rx="9" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="556" y="264" font-size="13" font-weight="700" fill="#1d4ed8">레이어 공유</text>
  <text x="556" y="286" font-size="11" fill="#475569">같은 베이스 레이어는 여러</text>
  <text x="556" y="304" font-size="11" fill="#475569">이미지·컨테이너가 공유 → 가볍다</text>

  <text x="28" y="356" font-size="12" fill="#334155">Dockerfile의 RUN·COPY 한 줄 = 레이어 하나. 한 레이어 바뀌면 그 위 캐시는 전부 무효.</text>
  <text x="28" y="380" font-size="11" fill="#94a3b8">→ 안 바뀌는 의존성을 아래(먼저), 자주 바뀌는 소스를 위(나중)에 둬야 빌드 캐시가 산다.</text>
</svg>
