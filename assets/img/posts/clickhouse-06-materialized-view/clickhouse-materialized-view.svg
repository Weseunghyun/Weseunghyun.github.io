<svg width="840" height="400" viewBox="0 0 840 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="-apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <title id="t">ClickHouse Materialized View 동작</title>
  <desc id="d">MV는 원본 테이블 INSERT 시 트리거되어 새로 들어온 블록에만 집계 SELECT를 돌려 타깃 테이블에 부분 집계 상태를 저장하고, 백그라운드 머지에서 같은 키 상태를 합친다</desc>
  <defs>
    <marker id="mv" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="840" height="400" rx="14" fill="#ffffff"/>
  <text x="28" y="32" font-size="18" font-weight="700" fill="#0f172a">Materialized View — 삽입 시점에 미리 집계</text>

  <!-- Row 1: insert path -->
  <text x="40" y="66" font-size="12" font-weight="700" fill="#64748b">① 삽입 경로</text>
  <text x="120" y="92" font-size="11" fill="#64748b" text-anchor="middle">INSERT 블록</text>
  <rect x="40" y="98" width="160" height="78" rx="9" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="120" y="130" font-size="13" font-weight="700" fill="#1d4ed8" text-anchor="middle">원본 테이블</text>
  <text x="120" y="150" font-size="11" fill="#475569" text-anchor="middle">MergeTree</text>

  <rect x="250" y="90" width="220" height="94" rx="10" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="360" y="120" font-size="14" font-weight="700" fill="#c2410c" text-anchor="middle">⚡ MV = 삽입 트리거</text>
  <text x="360" y="142" font-size="11" fill="#475569" text-anchor="middle">방금 들어온 블록에만</text>
  <text x="360" y="160" font-size="11" fill="#475569" text-anchor="middle">SELECT … GROUP BY 실행</text>

  <rect x="520" y="98" width="290" height="78" rx="9" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5"/>
  <text x="665" y="128" font-size="13" font-weight="700" fill="#0f766e" text-anchor="middle">타깃 테이블 (TO)</text>
  <text x="665" y="148" font-size="11" fill="#475569" text-anchor="middle">AggregatingMergeTree · 부분 집계 상태 저장</text>

  <g stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#mv)">
    <path d="M200 137 L248 137"/>
    <path d="M470 137 L518 137"/>
  </g>

  <!-- Row 2: read path -->
  <text x="40" y="232" font-size="12" font-weight="700" fill="#64748b">② 읽기 경로</text>
  <rect x="40" y="244" width="160" height="78" rx="9" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5"/>
  <text x="120" y="276" font-size="13" font-weight="700" fill="#0f766e" text-anchor="middle">타깃 테이블</text>
  <text x="120" y="296" font-size="11" fill="#475569" text-anchor="middle">부분 상태들</text>

  <rect x="250" y="244" width="220" height="78" rx="9" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="360" y="274" font-size="13" font-weight="700" fill="#334155" text-anchor="middle">백그라운드 머지</text>
  <text x="360" y="294" font-size="11" fill="#475569" text-anchor="middle">같은 ORDER BY 키 상태 합침</text>

  <rect x="520" y="244" width="290" height="78" rx="9" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="665" y="274" font-size="13" font-weight="700" fill="#1d4ed8" text-anchor="middle">SELECT … Merge() / FINAL</text>
  <text x="665" y="294" font-size="11" fill="#475569" text-anchor="middle">이미 집계돼 있어 빠름</text>

  <g stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#mv)">
    <path d="M200 283 L248 283"/>
    <path d="M470 283 L518 283"/>
  </g>
  <path d="M665 176 L665 244" stroke="#0d9488" stroke-width="1.6" fill="none" stroke-dasharray="5 4" marker-end="url(#mv)"/>
  <text x="690" y="214" font-size="10" fill="#0d9488">같은 테이블</text>

  <text x="28" y="372" font-size="12" font-weight="700" fill="#0f172a">핵심: 계산 비용을 "쿼리 시점 → 삽입 시점"으로 옮겨 SELECT를 빠르게.</text>
  <text x="28" y="390" font-size="11" fill="#94a3b8">MV는 원본 전체가 아니라 "그때 삽입된 블록"에만 돈다 — 그래서 증분(incremental)이다.</text>
</svg>
