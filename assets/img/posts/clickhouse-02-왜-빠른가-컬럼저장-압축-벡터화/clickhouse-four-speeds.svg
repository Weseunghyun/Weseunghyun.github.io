<svg width="860" height="430" viewBox="0 0 860 430" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="-apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <title id="t">ClickHouse의 속도 — 네 가지 설계가 곱해진 결과</title>
  <desc id="d">컬럼 저장을 출발점으로 압축·벡터화·병렬화가 층층이 쌓여, 적게 읽고 더 적은 바이트로 한 묶음씩 빠르게 동시에 많이 처리한다. 그 곱이 1억 행 92밀리초.</desc>
  <rect x="0" y="0" width="860" height="430" rx="14" fill="#ffffff"/>
  <text x="28" y="34" font-size="18" font-weight="700" fill="#0f172a">왜 빠른가 — 한 묘수가 아니라, 네 설계가 곱해진 결과</text>

  <!-- foundation: column storage -->
  <rect x="60" y="318" width="600" height="56" rx="9" fill="#1d4ed8"/>
  <text x="360" y="345" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">① 컬럼 저장 — 모든 빠름의 출발점</text>
  <text x="360" y="364" font-size="10.5" fill="#dbeafe" text-anchor="middle">필요한 컬럼만 읽는다 · 나머지는 디스크에서 건드리지도 않음</text>

  <!-- layer 2: compression -->
  <rect x="100" y="252" width="520" height="52" rx="9" fill="#2563eb"/>
  <text x="360" y="276" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">② 압축 (LZ4 / ZSTD / 특수 코덱)</text>
  <text x="360" y="294" font-size="10.5" fill="#dbeafe" text-anchor="middle">같은 종류 값이 모여 잘 줄어듦 → 읽을 바이트 ↓ = I/O ↓</text>

  <!-- layer 3: vectorization -->
  <rect x="140" y="186" width="440" height="52" rx="9" fill="#3b82f6"/>
  <text x="360" y="210" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">③ 벡터화 (SIMD)</text>
  <text x="360" y="228" font-size="10.5" fill="#eff6ff" text-anchor="middle">한 값씩 말고 한 묶음(8192행)씩 → 코어당 계산 ↑</text>

  <!-- layer 4: parallel -->
  <rect x="180" y="120" width="360" height="52" rx="9" fill="#60a5fa"/>
  <text x="360" y="144" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">④ 병렬화 (코어 · 노드)</text>
  <text x="360" y="162" font-size="10.5" fill="#1e3a8a" text-anchor="middle">코어 × 노드가 각자 일부씩 동시에 → 처리량 ×</text>

  <!-- multiply markers between layers -->
  <g font-size="22" font-weight="700" fill="#94a3b8" text-anchor="middle">
    <text x="40" y="300">×</text>
    <text x="40" y="234">×</text>
    <text x="40" y="168">×</text>
  </g>
  <text x="40" y="352" font-size="13" font-weight="700" fill="#64748b" text-anchor="middle">곱</text>

  <!-- result -->
  <rect x="690" y="186" width="146" height="120" rx="11" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.8"/>
  <text x="763" y="222" font-size="13" font-weight="700" fill="#047857" text-anchor="middle">= 결과</text>
  <text x="763" y="256" font-size="26" font-weight="800" fill="#059669" text-anchor="middle">92ms</text>
  <text x="763" y="282" font-size="11" fill="#475569" text-anchor="middle">1억 행 스캔</text>
  <text x="763" y="298" font-size="10" fill="#94a3b8" text-anchor="middle">공식 벤치마크 기준</text>

  <text x="28" y="406" font-size="11" fill="#94a3b8">위로 갈수록 아래층을 전제로 한다 — 컬럼별로 값이 줄 서 있지 않으면 압축도 벡터화도 성립하지 않는다. 네 빠름은 따로가 아니라 한 구조.</text>
</svg>
